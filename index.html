<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lindos Bank</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #f5f5f5;
      color: #333;
    }
    header {
      background-color: #444;
      color: white;
      padding: 20px;
      text-align: center;
    }
    .saldo {
      background-color: #fff;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .saldo h2 {
      margin: 0;
      font-size: 1.5em;
    }
    .saldo p {
      font-size: 1.2em;
      color: #555;
    }
    .acoes {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }
    .acoes button {
      background-color: #444;
      color: white;
      border: none;
      padding: 15px;
      border-radius: 8px;
      cursor: pointer;
      flex: 1;
      margin: 5px;
    }
    .acoes button:hover {
      background-color: #666;
    }
    .cartoes {
      background-color: #fff;
      padding: 20px;
      margin: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    footer {
      background-color: #444;
      color: white;
      text-align: center;
      padding: 15px;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Lindos Bank</h1>
    <p>Olá, Cliente</p>
  </header>

  <section class="saldo">
    <h2>Conta</h2>
    <p>R$ 851,65</p>
  </section>

  <section class="acoes">
    <button>Pix</button>
    <button>Pagar</button>
    <button>Transferir</button>
    <button>Depositar</button>
    <button>Empréstimo</button>
  </section>

  <section class="cartoes">
    <h2>Meus Cartões</h2>
    <p>Você tem R$ 25.000,00 disponíveis para empréstimo.</p>
    <p>Cartão bloqueado</p>
    <p>Fatura atual: R$ 1.686,03</p>
    <p>Limite disponível: R$ 6.663,97</p>
  </section>

  <footer>
    <p>&copy; 2026 Lindos Bank - Todos os direitos reservados</p>
  </footer>
</body>
</html>
